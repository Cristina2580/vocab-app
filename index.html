const emptyStates = {
  home: $('#homeEmpty'),
  marked: $('#markedEmpty'),
  deleted: $('#deletedEmpty'),
};

const meaningModal = $('#meaningModal');
const modalWordDisplay = $('#modalWordDisplay');
const modalMeaningInput = $('#modalMeaningInput');
const confirmOverlay = $('#confirmOverlay');
const confirmText = $('#confirmText');
const toast = $('#toast');

const importTextarea = $('#importTextarea');
const importResult = $('#importResult');

// ==================== STATE ====================
let words = [];
let currentPage = 'home';
let markedTab = 'green';
let currentModalWordId = null;
let confirmCallback = null;

// ==================== PERSISTENCE ====================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      words = JSON.parse(raw);
      // Data migration: ensure all words have required fields
      words.forEach(w => {
        if (!w.color) w.color = null;
        if (w.meaning === undefined) w.meaning = '';
        if (w.deleted === undefined) w.deleted = false;
        if (!w.id) w.id = generateId();
        if (!w.createdAt) w.createdAt = Date.now();
      });
    } else {
      // First time: load default words
      words = DEFAULT_WORDS.map(w => ({
        id: generateId(),
        word: w,
        meaning: '',
        color: null,
        deleted: false,
        deletedAt: null,
        createdAt: Date.now(),
      }));
      saveData();
    }
  } catch (e) {
    words = [];
  }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
  } catch (e) {
    showToast('⚠️ 存储空间不足，请清理一些数据');
  }
}

function generateId() {
  return 'w_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5);
}

// ==================== HELPERS ====================
function getHomeWords() {
  const q = searchInput.value.trim().toLowerCase();
  let result = words.filter(w => !w.deleted);
  if (q) {
    result = result.filter(w => w.word.toLowerCase().includes(q));
  }
  return result;
}

function getMarkedWords(color) {
  return words.filter(w => !w.deleted && w.color === color);
}

function getDeletedWords() {
  return words.filter(w => w.deleted);
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

function showConfirm(msg, cb) {
  confirmText.textContent = msg;
  confirmCallback = cb;
  confirmOverlay.classList.add('active');
}

// ==================== VIRTUAL SCROLL ====================
function renderVirtualList(containerId, items, renderRow) {
  const container = scrollContainers[containerId];
  const spacer = spacers[containerId];
  const windowEl = windows[containerId];
  const emptyEl = emptyStates[containerId];

  if (!container || !spacer || !windowEl) return;

  // Handle empty state
  if (items.length === 0) {
    container.style.display = 'none';
    if (emptyEl) emptyEl.style.display = 'flex';
    return;
  }
  container.style.display = '';
  if (emptyEl) emptyEl.style.display = 'none';

  const totalHeight = items.length * ROW_HEIGHT;
  spacer.style.height = totalHeight + 'px';

  const scrollTop = container.scrollTop;
  const containerHeight = container.clientHeight;

  const startIndex = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER);
  const endIndex = Math.min(items.length, Math.ceil((scrollTop + containerHeight) / ROW_HEIGHT) + BUFFER);

  windowEl.style.top = (startIndex * ROW_HEIGHT) + 'px';

  let html = '';
  for (let i = startIndex; i < endIndex; i++) {
    html += renderRow(items[i], i);
  }
  windowEl.innerHTML = html;
}

// ==================== ROW RENDERERS ====================
function renderHomeRow(w) {
  const cls = [];
  if (w.color === 'green') cls.push('marked-green');
  if (w.color === 'red') cls.push('marked-red');
  const wordCls = w.meaning ? 'word-text has-meaning' : 'word-text';
  const meaningCls = w.meaning ? 'btn btn-meaning has-meaning-dot' : 'btn btn-meaning';

  return `
    <div class="word-row ${cls.join(' ')}" data-id="${w.id}">
      <span class="${wordCls}">${escHtml(w.word)}</span>
      <div class="word-actions">
        <button class="${meaningCls}" data-action="meaning" data-id="${w.id}">释义</button>
        <button class="btn btn-green" data-action="mark-green" data-id="${w.id}">标绿</button>
        <button class="btn btn-red" data-action="mark-red" data-id="${w.id}">标红</button>
        <button class="btn btn-delete" data-action="soft-delete" data-id="${w.id}">删除</button>
      </div>
    </div>`;
}

function renderMarkedRow(w) {
  const cls = w.color === 'green' ? 'marked-green' : 'marked-red';
  const wordCls = w.meaning ? 'word-text has-meaning' : 'word-text';
  const meaningCls = w.meaning ? 'btn btn-meaning has-meaning-dot' : 'btn btn-meaning';

  return `
    <div class="word-row ${cls}" data-id="${w.id}">
      <span class="${wordCls}">${escHtml(w.word)}</span>
      <div class="word-actions">
        <button class="${meaningCls}" data-action="meaning" data-id="${w.id}">释义</button>
        <button class="btn btn-delete" data-action="unmark" data-id="${w.id}">取消标记</button>
        <button class="btn btn-delete" data-action="soft-delete" data-id="${w.id}">删除</button>
      </div>
    </div>`;
}

function renderDeletedRow(w) {
  return `
    <div class="word-row deleted-row" data-id="${w.id}">
      <span class="word-text">${escHtml(w.word)}</span>
      <div class="word-actions">
        <button class="btn btn-restore" data-action="restore" data-id="${w.id}">恢复</button>
        <button class="btn btn-permadelete" data-action="perma-delete" data-id="${w.id}">彻底删除</button>
      </div>
    </div>`;
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ==================== RENDER PAGES ====================
function renderHome() {
  const items = getHomeWords();
  renderVirtualList('home', items, renderHomeRow);
  updateBadge('home', words.filter(w => !w.deleted).length);
}

function renderMarked() {
  const items = getMarkedWords(markedTab);
  renderVirtualList('marked', items, renderMarkedRow);
  updateBadge('greenCount', getMarkedWords('green').length);
  updateBadge('redCount', getMarkedWords('red').length);
  updateBadge('marked', getMarkedWords('green').length + getMarkedWords('red').length);
}

function renderDeleted() {
  const items = getDeletedWords();
  renderVirtualList('deleted', items, renderDeletedRow);
  updateBadge('deleted', items.length);
}

function updateBadge(id, count) {
  const el = document.getElementById(id);
  if (!el) return;
  if (count > 0) {
    el.textContent = count > 99 ? '99+' : count;
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

function renderCurrentPage() {
  switch (currentPage) {
    case 'home': renderHome(); break;
    case 'marked': renderMarked(); break;
    case 'deleted': renderDeleted(); break;
  }
}

function renderAll() {
  renderHome();
  renderMarked();
  renderDeleted();
}

// ==================== PAGE SWITCHING ====================
function switchPage(page) {
  currentPage = page;

  // Update pages
  Object.keys(pages).forEach(k => pages[k].classList.remove('active'));
  pages[page].classList.add('active');

  // Update nav
  $$('.nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');

  // Update header
  if (page === 'home') {
    headerTitle.textContent = '📚 背单词';
    searchBox.style.display = 'flex';
  } else if (page === 'marked') {
    headerTitle.textContent = '🏷️ 标记';
    searchBox.style.display = 'none';
  } else if (page === 'deleted') {
    headerTitle.textContent = '🗑️ 删除';
    searchBox.style.display = 'none';
  } else if (page === 'import') {
    headerTitle.textContent = '📥 导入';
    searchBox.style.display = 'none';
  }

  renderCurrentPage();
}

// ==================== ACTIONS ====================
function getWordById(id) {
  return words.find(w => w.id === id);
}

function handleAction(action, wordId) {
  const w = getWordById(wordId);
  if (!w) return;

  switch (action) {
    case 'meaning':
      openMeaningModal(w);
      break;
    case 'mark-green':
      w.color = w.color === 'green' ? null : 'green';
      saveData();
      renderAll();
      break;
    case 'mark-red':
      w.color = w.color === 'red' ? null : 'red';
      saveData();
      renderAll();
      break;
    case 'soft-delete':
      w.deleted = true;
      w.deletedAt = Date.now();
      saveData();
      renderAll();
      showToast(`已删除: ${w.word}`);
      break;
    case 'unmark':
      w.color = null;
      saveData();
      renderAll();
      showToast(`已取消标记: ${w.word}`);
      break;
    case 'restore':
      w.deleted = false;
      w.deletedAt = null;
      saveData();
      renderAll();
      showToast(`已恢复: ${w.word}`);
      break;
    case 'perma-delete':
      showConfirm(`确定要彻底删除「${w.word}」吗？此操作不可恢复。`, () => {
        words = words.filter(x => x.id !== wordId);
        saveData();
        renderAll();
        showToast(`已彻底删除: ${w.word}`);
      });
      break;
  }
}

// ==================== MEANING MODAL ====================
function openMeaningModal(w) {
  currentModalWordId = w.id;
  modalWordDisplay.textContent = w.word;
  modalMeaningInput.value = w.meaning || '';
  meaningModal.classList.add('active');
  setTimeout(() => modalMeaningInput.focus(), 300);
}

function closeMeaningModal() {
  meaningModal.classList.remove('active');
  currentModalWordId = null;
  modalMeaningInput.value = '';
}

function saveMeaning() {
  if (!currentModalWordId) return;
  const w = getWordById(currentModalWordId);
  if (!w) return;
  w.meaning = modalMeaningInput.value.trim();
  saveData();
  renderAll();
  closeMeaningModal();
  if (w.meaning) {
    showToast('释义已保存 ✓');
  } else {
    showToast('释义已清空');
  }
}

// ==================== IMPORT ====================
function doImport() {
  const raw = importTextarea.value.trim();
  if (!raw) {
    showToast('请先输入单词');
    return;
  }

  // Split by comma, clean up
  const parts = raw.split(',').map(s => s.trim()).filter(s => s.length > 0);

  if (parts.length === 0) {
    showToast('没有检测到有效单词');
    return;
  }

  let added = 0;
  const duplicates = [];
  const existingWords = new Set(words.map(w => w.word.toLowerCase()));

  parts.forEach(part => {
    if (existingWords.has(part.toLowerCase())) {
      duplicates.push(part);
    } else {
      words.push({
        id: generateId(),
        word: part,
        meaning: '',
        color: null,
        deleted: false,
        deletedAt: null,
        createdAt: Date.now(),
      });
      existingWords.add(part.toLowerCase());
      added++;
    }
  });

  saveData();
  renderAll();

  // Show result
  importResult.className = 'import-result show';
  let msg = '';
  if (added > 0) {
    importResult.classList.add('success');
    msg += `✅ 成功导入 ${added} 个单词`;
  }
  if (duplicates.length > 0) {
    importResult.classList.add(added === 0 ? 'warning' : 'success');
    msg += (msg ? '<br>' : '') + `⚠️ ${duplicates.length} 个重复已跳过`;
    if (duplicates.length <= 20) {
      msg += `<div class="dup-list">${duplicates.map(escHtml).join(', ')}</div>`;
    } else {
      msg += `<div class="dup-list">${duplicates.slice(0, 20).map(escHtml).join(', ')}... 等</div>`;
    }
  }
  if (added === 0 && duplicates.length === 0) {
    importResult.classList.add('warning');
    msg = '未识别到单词，请检查格式';
  }

  importResult.innerHTML = msg;

  if (added > 0) {
    importTextarea.value = '';
  }
}

// ==================== EVENT DELEGATION ====================
// Click delegation for word actions in virtual scroll windows
Object.values(windows).forEach(win => {
  win.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const action = btn.dataset.action;
    const wordId = btn.dataset.id;
    handleAction(action, wordId);
  });
});

// Bottom nav
$$('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const page = item.dataset.page;
    if (page) switchPage(page);
  });
});

// Scroll events for virtual scrolling
Object.entries(scrollContainers).forEach(([key, container]) => {
  if (!container) return;
  let ticking = false;
  container.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        if (key === 'home') renderHome();
        else if (key === 'marked') renderMarked();
        else if (key === 'deleted') renderDeleted();
        ticking = false;
      });
      ticking = true;
    }
  });
});

// Search
let searchTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    if (searchInput.value.trim()) {
      searchClear.classList.add('visible');
    } else {
      searchClear.classList.remove('visible');
    }
    renderHome();
  }, 150);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  renderHome();
  searchInput.focus();
});

// Meaning modal
$('#modalCancel').addEventListener('click', closeMeaningModal);
$('#modalSave').addEventListener('click', saveMeaning);
meaningModal.addEventListener('click', (e) => {
  if (e.target === meaningModal) closeMeaningModal();
});
modalMeaningInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveMeaning();
});

// Confirm dialog
$('#confirmCancel').addEventListener('click', () => {
  confirmOverlay.classList.remove('active');
  confirmCallback = null;
});
$('#confirmOk').addEventListener('click', () => {
  confirmOverlay.classList.remove('active');
  if (confirmCallback) {
    const cb = confirmCallback;
    confirmCallback = null;
    cb();
  }
});

// Import
$('#btnImport').addEventListener('click', doImport);
$('#btnClearImport').addEventListener('click', () => {
  importTextarea.value = '';
  importResult.className = 'import-result';
  importResult.innerHTML = '';
});

// Tab switching
document.querySelector('.tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  markedTab = tab.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  renderMarked();
});

// Resize handler - re-render on resize (keyboard open/close, orientation change)
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(renderCurrentPage, 200);
});

// Keyboard escape to close modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (meaningModal.classList.contains('active')) closeMeaningModal();
    if (confirmOverlay.classList.contains('active')) {
      confirmOverlay.classList.remove('active');
      confirmCallback = null;
    }
  }
});

// ==================== INIT ====================
function init() {
  loadData();
  switchPage('home');

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/vocab-app/sw.js').catch(() => {});
  }
  updateBadge('home', words.filter(w => !w.deleted).length);
  updateBadge('greenCount', getMarkedWords('green').length);
  updateBadge('redCount', getMarkedWords('red').length);
  updateBadge('marked', getMarkedWords('green').length + getMarkedWords('red').length);
  updateBadge('deleted', getDeletedWords().length);
}

init();

console.log('📚 背单词 App 已就绪');
console.log('   单词总数:', words.length);
console.log('   首页单词:', words.filter(w => !w.deleted).length);
console.log('   标记单词:', words.filter(w => !w.deleted && w.color).length);
console.log('   已删除:', words.filter(w => w.deleted).length);
console.log('   数据存储在浏览器 localStorage，不会丢失');
})();
</script>
